LogConfiguration {
    # This is the pattern of the log (Generated by LogFileGenerator)
    LogPattern = "(\\d{2}\\:\\d{2}\\:\\d{2}\\.\\d{3})\\s(\\[.+\\])\\s(ERROR|WARN|DEBUG|INFO)\\s+(.*)\\s\\-\\s(.+)"
    # Change the Regex pattern here to find the injected string instance in the log files
    InjectedStringPattern = "([a-c][e-g][0-3]|[A-Z][5-9][f-w]){5,15}"
    # "(.+)"
    # "([a-c][e-g][0-3]|[A-Z][5-9][f-w]){5,15}"
    # Change this to the dateformat of the logs
    DateFormat = "HH:mm:ss.SSS"
    # Change this to set the intervals (should be in seconds, e.g: 60 will seconds intervals, 3600 will be minute interval)
    Interval = 60
    # For Task 2, change this to other error level to get their distribution in descending order
    LogErrorLevel = "WARN"
}